<!doctype html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OttO</title>
<meta name="robots" content="noindex" />

<!--
  QR REDIRECT — unica cosa da modificare quando cambia la destinazione:
  la costante REDIRECT_URL qui sotto (e lo stesso URL nel meta refresh sotto).
  Il QR stampato resta sempre "https://ottocagliari.enricowebdigital.com/vai/",
  punta solo a questa pagina: cambia qui, non serve ristampare nulla.
-->
<script>
  var REDIRECT_URL = "https://ottocagliari.enricowebdigital.com/";
  window.location.replace(REDIRECT_URL);
</script>
<meta http-equiv="refresh" content="0; url=https://ottocagliari.enricowebdigital.com/" />

<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #7B4FA0;
    font-family: -apple-system, "Nunito", sans-serif;
    color: #fff;
    text-align: center;
  }
  a { color: #fff; }
</style>
</head>
<body>
  <p>Un attimo, ti portiamo da OttO&hellip;<br />
  <a href="https://ottocagliari.enricowebdigital.com/">clicca qui se non vieni reindirizzato</a></p>
</body>
</html>
